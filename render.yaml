services:
  - type: web
    name: wander-api
    runtime: python
    region: oregon
    plan: free
    rootDir: src/backend
    buildCommand: pip install .
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false

      - key: CORS_ORIGINS
        sync: false

      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"

      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: LLM_PROVIDER
        value: nvidia
      - key: LLM_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b

      - key: DIGILOCKER_CLIENT_ID
        sync: false
      - key: DIGILOCKER_CLIENT_SECRET
        sync: false

      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        value: admin@wander.app

    # ── Deployment notes ──────────────────────────────────────
    # Free tier: 750 hrs/mo (24/7 for one service = ~720 hrs).
    # Service sleeps after 15 min inactivity, ~30-60s cold start.
    # Create accounts on: supabase.com   neon.tech   upstash.com
    #
    # Env vars to fill after first deploy (set in Render dashboard):
    #   DATABASE_URL = postgresql+asyncpg://user:pass@host/db
    #   REDIS_URL = redis://user:pass@host:port
    #   CORS_ORIGINS = ["https://your-frontend.vercel.app"]
    #   SUPABASE_JWT_SECRET = superset-jwt-secret
